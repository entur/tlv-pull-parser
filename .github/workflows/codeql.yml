# Reusable Workflows see: https://github.com/entur/gha-security/blob/main/README-code-scan.md

name: CodeQL Scan

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"
  schedule:
    - cron: "0 4 * * TUE" # Run Monday at 3AM UTC

jobs:
  code-scan:
    if: github.event.pull_request.author_association == 'MEMBER' || github.event.pull_request.author_association == 'OWNER' # TODO remove me when less default permissions
    name: CodeQL Scan
    uses: entur/gha-security/.github/workflows/code-scan.yml@v2
    permissions:
      contents: write
      security-events: write
      actions: read
      pull-requests: read
    with:
      java_distribution: "temurin"

