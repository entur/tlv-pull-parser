# Reusable Workflows see: https://github.com/entur/gha-security/blob/main/README-code-scan.md

name: CodeQL Scan

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"
  schedule:
    - cron: "0 4 * * TUE" # Run Monday at 3AM UTC

jobs:
  code-scan:
    name: CodeQL Scan
    uses: entur/gha-security/.github/workflows/code-scan.yml@aeebe7ddac5952b3ef9f14380e2d5884b42a6c2e  # v2.13.0
    # no secrets necessary
    permissions: # some of these only apply when running on the main branch
      packages: read
      actions: read
      contents: write
      pull-requests: write
      security-events: write
      issues: write
